    <script>
        const manifest = {
            "name": "Market POS Pro",
            "short_name": "POS ร้าน JameS",
            "description": "ระบบจัดการร้านผ้ามือสองหน้าตลาด",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#f0f4f8",
            "theme_color": "#a855f7",
            "icons": [{ "src": "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238b5cf6' /%3E%3Cstop offset='100%25' stop-color='%23ec4899' /%3E%3C/linearGradient%3E%3ClinearGradient id='cloth' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff' /%3E%3Cstop offset='100%25' stop-color='%23e2e8f0' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='120' fill='url(%23bg)'/%3E%3Cpath d='M150 140 C150 140 200 100 256 100 C312 100 362 140 362 140 L440 200 C450 210 440 240 420 240 L380 210 L380 400 C380 420 360 420 360 420 L152 420 C152 420 132 420 132 400 L132 210 L92 240 C72 240 62 210 72 200 Z' fill='url(%23cloth)' /%3E%3Ccircle cx='210' cy='250' r='20' fill='%231e293b'/%3E%3Ccircle cx='302' cy='250' r='20' fill='%231e293b'/%3E%3Ccircle cx='215' cy='243' r='6' fill='%23ffffff'/%3E%3Ccircle cx='307' cy='243' r='6' fill='%23ffffff'/%3E%3Cpath d='M236 270 Q 256 295 276 270' stroke='%231e293b' stroke-width='14' stroke-linecap='round' fill='transparent'/%3E%3Cellipse cx='170' cy='275' rx='18' ry='12' fill='%23ff9a9e' opacity='0.8'/%3E%3Cellipse cx='342' cy='275' rx='18' ry='12' fill='%23ff9a9e' opacity='0.8'/%3E%3C/svg%3E", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" }]

        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob); document.head.appendChild(link);

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .animate-slide-down { animation: slideDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

<body class="selection:bg-purple-200">
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name, ...props }) => {
            const iconRef = React.useRef(null);
            React.useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const svgElement = document.createElement('i');
                    svgElement.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(svgElement);
                    lucide.createIcons({
                        root: iconRef.current,
                        attrs: { class: props.className || '', width: props.size || 24, height: props.size || 24, stroke: props.color || 'currentColor', 'stroke-width': props.strokeWidth || 2 }
                    });
                }
            }, [name, props.className, props.size, props.color, props.strokeWidth]);
            return <span ref={iconRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('sell');
            
            // ดึงข้อมูลเวอร์ชันก่อนหน้า
            const [sales, setSales] = React.useState(() => JSON.parse(localStorage.getItem('pos_sales_v21') || localStorage.getItem('pos_sales_v20') || localStorage.getItem('pos_sales_v19')) || []);
            const [expenses, setExpenses] = React.useState(() => JSON.parse(localStorage.getItem('pos_expenses_v21') || localStorage.getItem('pos_expenses_v20') || localStorage.getItem('pos_expenses_v19')) || []);
            const [bales, setBales] = React.useState(() => JSON.parse(localStorage.getItem('pos_bales_v21') || localStorage.getItem('pos_bales_v20') || localStorage.getItem('pos_bales_v19')) || []);
            const [settings, setSettings] = React.useState(() => JSON.parse(localStorage.getItem('pos_settings_v21') || localStorage.getItem('pos_settings_v20')) || {
                promptpayId: '', shopName: 'ร้านผ้า JameS',
                defaultCategories: ['เสื้อยืด', 'เชิ้ต', 'กางเกง', 'ขาสั้น', 'เสื้อกล้าม', 'เดรส', 'กางเกงขายาว', 'อื่นๆ']
            });

            const [customPrice, setCustomPrice] = React.useState('');
            const [itemQty, setItemQty] = React.useState(1); 
            const [selectedCategory, setSelectedCategory] = React.useState(settings.defaultCategories[0]);
            
            const [showExpenseModal, setShowExpenseModal] = React.useState(false);
            const [deleteTarget, setDeleteTarget] = React.useState(null); 
            const [toast, setToast] = React.useState(null); 

            const [expenseForm, setExpenseForm] = React.useState({ name: '', amount: '', type: 'ค่าที่' });
            const [baleForm, setBaleForm] = React.useState({ name: '', cost: '', count: '' });
            
            const [currentDateFilter, setCurrentDateFilter] = React.useState(new Date().toDateString());
            const [historyViewMode, setHistoryViewMode] = React.useState('daily');

            const priceInputRef = React.useRef(null);

            React.useEffect(() => localStorage.setItem('pos_sales_v21', JSON.stringify(sales)), [sales]);
            React.useEffect(() => localStorage.setItem('pos_expenses_v21', JSON.stringify(expenses)), [expenses]);
            React.useEffect(() => localStorage.setItem('pos_bales_v21', JSON.stringify(bales)), [bales]);
            React.useEffect(() => localStorage.setItem('pos_settings_v21', JSON.stringify(settings)), [settings]);

            // ระบบรวบยอดออโต้
            React.useEffect(() => {
                let hasChanges = false;
                let newSales = [...sales];
                let newExpenses = [...expenses];
                const todayStr = new Date().toDateString();

                const oldSales = newSales.filter(s => new Date(s.timestamp).toDateString() !== todayStr && !s.isCompressed);
                if(oldSales.length > 0) {
                    const grouped = {};
                    oldSales.forEach(s => {
                        const d = new Date(s.timestamp).toDateString();
                        const key = `${d}_${s.category}_${s.paymentMethod}`;
                        if (!grouped[key]) {
                            grouped[key] = { id: `comp_s_${Date.now()}_${Math.random()}`, amount: 0, qty: 0, category: s.category, paymentMethod: s.paymentMethod, timestamp: s.timestamp, isCompressed: true };
                        }
                        grouped[key].amount += s.amount;
                        grouped[key].qty += (s.qty || 1);
                    });
                    const preservedSales = newSales.filter(s => new Date(s.timestamp).toDateString() === todayStr || s.isCompressed);
                    newSales = [...Object.values(grouped), ...preservedSales];
                    hasChanges = true;
                }

                const oldExpenses = newExpenses.filter(e => new Date(e.timestamp).toDateString() !== todayStr && !e.isCompressed);
                if(oldExpenses.length > 0) {
                    const grouped = {};
                    oldExpenses.forEach(e => {
                        const d = new Date(e.timestamp).toDateString();
                        const key = `${d}_${e.type}`;
                        if (!grouped[key]) {
                            grouped[key] = { id: `comp_e_${Date.now()}_${Math.random()}`, name: `รวม${e.type}`, amount: 0, type: e.type, timestamp: e.timestamp, isCompressed: true };
                        }
                        grouped[key].amount += e.amount;
                    });
                    const preservedExp = newExpenses.filter(e => new Date(e.timestamp).toDateString() === todayStr || e.isCompressed);
                    newExpenses = [...Object.values(grouped), ...preservedExp];
                    hasChanges = true;
                }

                if(hasChanges) {
                    setSales(newSales);
                    setExpenses(newExpenses);
                }
            }, []);

            React.useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible') {
                        const realTimeDate = new Date().toDateString();
                        if (activeTab === 'sell') setCurrentDateFilter(realTimeDate);
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, [activeTab]);

            // 🌟 อัปเดตราคาลัดตามที่ลูกค้าระบุ 🌟
            const quickPrices = [35, 50, 79, 100, 150, 200];
            const expenseTypes = ['ค่าที่/ค่าไฟ', 'ค่าถุง/อุปกรณ์', 'ค่าเดินทาง', 'จิปาถะ', 'อื่นๆ'];

            const filterDate = new Date(currentDateFilter);
            const isToday = (dateString) => new Date(dateString).toDateString() === currentDateFilter;
            const isSameMonth = (dateString) => {
                const d = new Date(dateString);
                return d.getMonth() === filterDate.getMonth() && d.getFullYear() === filterDate.getFullYear();
            };

            const todaySales = sales.filter(s => isToday(s.timestamp));
            const todayExpenses = expenses.filter(e => isToday(e.timestamp));
            const totalSalesAmount = todaySales.reduce((sum, sale) => sum + sale.amount, 0);
            const totalItemsSold = todaySales.reduce((sum, sale) => sum + (sale.qty || 1), 0);
            const totalExpenseAmount = todayExpenses.reduce((sum, exp) => sum + exp.amount, 0);
            const cashTotal = todaySales.filter(s => s.paymentMethod === 'cash').reduce((sum, s) => sum + s.amount, 0);
            const transferTotal = todaySales.filter(s => s.paymentMethod === 'transfer').reduce((sum, s) => sum + s.amount, 0);
            const netProfit = totalSalesAmount - totalExpenseAmount;

            const monthlySales = sales.filter(s => isSameMonth(s.timestamp));
            const monthlyExpenses = expenses.filter(e => isSameMonth(e.timestamp));
            const monthlyTotalSalesAmount = monthlySales.reduce((sum, sale) => sum + sale.amount, 0);
            const monthlyTotalExpenseAmount = monthlyExpenses.reduce((sum, exp) => sum + exp.amount, 0);
            const monthlyNetProfit = monthlyTotalSalesAmount - monthlyTotalExpenseAmount;
            const monthlyCashTotal = monthlySales.filter(s => s.paymentMethod === 'cash').reduce((sum, s) => sum + s.amount, 0);
            const monthlyTransferTotal = monthlySales.filter(s => s.paymentMethod === 'transfer').reduce((sum, s) => sum + s.amount, 0);

            const categoryRanking = monthlySales.reduce((acc, sale) => {
                acc[sale.category] = (acc[sale.category] || 0) + (sale.qty || 1);
                return acc;
            }, {});
            const topCategories = Object.entries(categoryRanking).sort((a, b) => b[1] - a[1]).slice(0, 3); 

            const dailySummary = {};
            monthlySales.forEach(s => {
                const d = new Date(s.timestamp).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
                if(!dailySummary[d]) dailySummary[d] = { date: d, sales: 0, expenses: 0, rawDate: new Date(s.timestamp).setHours(0,0,0,0) };
                dailySummary[d].sales += s.amount;
            });
            monthlyExpenses.forEach(e => {
                const d = new Date(e.timestamp).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
                if(!dailySummary[d]) dailySummary[d] = { date: d, sales: 0, expenses: 0, rawDate: new Date(e.timestamp).setHours(0,0,0,0) };
                dailySummary[d].expenses += e.amount;
            });
            const monthlyDailyList = Object.values(dailySummary).sort((a,b) => b.rawDate - a.rawDate);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 2000);
            };

            const handlePriceChange = (e) => setCustomPrice(e.target.value);

            const handleQuickPriceClick = (price) => {
                setCustomPrice(price.toString());
                if (priceInputRef.current) priceInputRef.current.blur();
            };

            const handleClearPriceClick = () => {
                setCustomPrice('');
                if (priceInputRef.current) priceInputRef.current.blur();
            };

            const handleAddSaleClick = (method) => {
                const amount = parseFloat(customPrice);
                if (!amount || isNaN(amount) || amount <= 0) return;
                
                const now = new Date();
                const newSale = {
                    id: Date.now().toString(), 
                    amount, 
                    qty: itemQty, 
                    category: selectedCategory, 
                    paymentMethod: method, 
                    timestamp: now.toISOString(),
                };
                
                setSales([newSale, ...sales]);
                setCustomPrice('');
                setItemQty(1);
                setCurrentDateFilter(now.toDateString());
                if (priceInputRef.current) priceInputRef.current.blur();

                showToast(method === 'cash' ? 'รับเงินสดสำเร็จ!' : 'สแกนโอนสำเร็จ!', 'success');
            };

            const handleCategoryClick = (cat) => setSelectedCategory(cat);

            const handleAddExpense = (e) => {
                e.preventDefault();
                if (!expenseForm.name || !expenseForm.amount) return;
                const now = new Date();
                setExpenses([{
                    id: Date.now().toString(), name: expenseForm.name, amount: parseFloat(expenseForm.amount), type: expenseForm.type, timestamp: now.toISOString(),
                }, ...expenses]);
                setCurrentDateFilter(now.toDateString());
                setShowExpenseModal(false);
                setExpenseForm({ name: '', amount: '', type: 'ค่าที่' });
                showToast('บันทึกรายจ่ายสำเร็จ', 'success');
            };

            const handleAddBale = (e) => {
                e.preventDefault();
                if (!baleForm.name || !baleForm.cost) return;
                setBales([{
                    id: Date.now().toString(), name: baleForm.name, cost: parseFloat(baleForm.cost), estimatedCount: parseInt(baleForm.count) || 0, timestamp: new Date().toISOString(), status: 'active'
                }, ...bales]);
                setBaleForm({ name: '', cost: '', count: '' });
                showToast('บันทึกกระสอบใหม่สำเร็จ', 'success');
            };

            const executeDelete = () => {
                if (!deleteTarget) return;
                const { type, id } = deleteTarget;
                if (type === 'sale') setSales(sales.filter(s => s.id !== id));
                if (type === 'expense') setExpenses(expenses.filter(e => e.id !== id));
                if (type === 'bale') setBales(bales.filter(b => b.id !== id));
                if (type === 'all') { setSales([]); setExpenses([]); setBales([]); }
                setDeleteTarget(null);
                showToast(type === 'all' ? 'ล้างข้อมูลระบบเรียบร้อย' : 'ลบรายการสำเร็จ', 'delete');
            };

            // --- UI Components ---
            const renderDashboardHeader = (showTitle = true) => (
                <div className="bg-gradient-to-br from-[#4158D0] via-[#C850C0] to-[#FFCC70] text-white rounded-[32px] p-6 shadow-[0_15px_30px_-10px_rgba(200,80,192,0.5)] mb-6 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-white/20 rounded-full blur-3xl -translate-y-20 translate-x-10 pointer-events-none mix-blend-overlay"></div>
                    <div className="absolute bottom-0 left-0 w-48 h-48 bg-black/10 rounded-full blur-2xl translate-y-10 -translate-x-5 pointer-events-none"></div>

                    {showTitle && (
                    <div className="flex justify-between items-center mb-6 relative z-10">
                        <div className="flex items-center gap-2">
                            <div className="bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/30 shadow-inner">
                                <Icon name="store" size={18} className="text-white drop-shadow-md" />
                            </div>
                            <h1 className="text-lg font-black tracking-wide drop-shadow-md">{settings.shopName}</h1>
                        </div>
                        <div className="bg-black/20 px-3 py-1.5 rounded-full flex items-center text-xs font-bold backdrop-blur-md text-white border border-white/10 shadow-inner">
                            <Icon name="calendar" size={12} className="mr-1.5" />
                            {isToday(currentDateFilter) ? 'วันนี้' : new Date(currentDateFilter).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })}
                        </div>
                    </div>
                    )}

                    <div className="flex justify-between items-end mb-6 relative z-10">
                        <div>
                            <p className="text-[11px] font-black text-white/80 tracking-widest uppercase mb-1 drop-shadow-sm">ยอดขายสุทธิ <span className="text-white/60 normal-case">({totalItemsSold} ชิ้น)</span></p>
                            <div className="flex items-baseline gap-1.5">
                                <span className="text-2xl font-black text-white/90 drop-shadow-md">฿</span>
                                <span className="text-6xl font-black tracking-tighter drop-shadow-lg">{totalSalesAmount.toLocaleString()}</span>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-[11px] font-black text-white/80 tracking-widest uppercase mb-1 drop-shadow-sm">กำไร (วัน)</p>
                            <div className={`text-2xl font-black drop-shadow-md ${netProfit >= 0 ? 'text-[#84ffc9]' : 'text-[#ff9a9e]'}`}>
                                {netProfit >= 0 ? '+' : ''}{netProfit.toLocaleString()}
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-3 relative z-10">
                        <div className="flex-1 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl p-3 flex items-center gap-3 shadow-[0_8px_16px_rgba(16,185,129,0.3)] border border-emerald-300">
                            <div className="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center text-white shadow-inner">
                                <Icon name="banknote" size={18} className="drop-shadow-sm" />
                            </div>
                            <div>
                                <p className="text-[10px] text-emerald-50 font-black uppercase tracking-wider">เงินสด</p>
                                <p className="text-[15px] font-black text-white drop-shadow-md">฿{cashTotal.toLocaleString()}</p>
                            </div>
                        </div>
                        <div className="flex-1 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl p-3 flex items-center gap-3 shadow-[0_8px_16px_rgba(59,130,246,0.3)] border border-blue-400">
                            <div className="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center text-white shadow-inner">
                                <Icon name="smartphone" size={18} className="drop-shadow-sm" />
                            </div>
                            <div>
                                <p className="text-[10px] text-blue-100 font-black uppercase tracking-wider">โอนเงิน</p>
                                <p className="text-[15px] font-black text-white drop-shadow-md">฿{transferTotal.toLocaleString()}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderSellTab = () => (
                <div className="p-4 pb-32 max-w-md mx-auto w-full animate-fade-in relative safe-pt">
                
                {renderDashboardHeader(true)}

                {/* Category Grid */}
                <div className="mb-6 bg-white/80 backdrop-blur-xl p-5 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white">
                    <div className="flex items-center gap-2 mb-4 px-1">
                        <div className="bg-gradient-to-br from-fuchsia-500 to-purple-600 text-white p-1.5 rounded-xl shadow-md shadow-purple-500/30">
                            <Icon name="shirt" size={16} />
                        </div>
                        <h3 className="text-[15px] font-black text-slate-800 tracking-tight">เลือกหมวดหมู่</h3>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-2.5">
                    {settings.defaultCategories.map(cat => {
                        const isSelected = selectedCategory === cat;
                        return (
                        <button
                            key={cat}
                            onClick={() => handleCategoryClick(cat)}
                            className={`py-2.5 px-1 rounded-2xl text-[12px] font-black transition-all duration-300 border text-center flex items-center justify-center min-h-[48px] ${
                            isSelected 
                                ? 'bg-gradient-to-br from-fuchsia-500 to-purple-600 text-white border-transparent shadow-[0_8px_15px_rgba(192,38,211,0.3)] scale-105' 
                                : 'bg-slate-50/80 text-slate-600 border-slate-200/60 hover:border-purple-300 hover:bg-purple-50'
                            }`}
                        >
                            {cat}
                        </button>
                        )
                    })}
                    </div>
                </div>

                                <span className={`text-4xl font-black tracking-tight drop-shadow-md ${overallProfit >= 0 ? 'text-[#84ffc9]' : 'text-[#ff9a9e]'}`}>
                                    {overallProfit >= 0 ? '+' : ''}{overallProfit.toLocaleString()}
                                </span>
                                <span className="text-sm font-black text-slate-500">THB</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white/80 backdrop-blur-xl p-6 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white mb-8">
                    <h3 className="font-black text-slate-800 mb-5 flex items-center text-[15px]">
                        <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 text-white flex items-center justify-center mr-3 shadow-md shadow-orange-500/30">
                            <Icon name="scissors" size={16}/>
                        </div>
                        เปิดกระสอบใหม่
                    </h3>
                    <form onSubmit={handleAddBale} className="space-y-4">
                        <input 
                        type="text" required placeholder="ชื่อกระสอบ (เช่น เสื้อ USA เกรด A)"
                        value={baleForm.name} onChange={e => setBaleForm({...baleForm, name: e.target.value})}
                        className="w-full p-4 bg-slate-50 border border-slate-200/60 rounded-2xl text-[14px] font-bold outline-none focus:border-orange-400 focus:bg-white transition-colors placeholder-slate-400"
                        />
                        <div className="flex gap-3">
                        <div className="relative flex-1">
                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-black text-sm">฿</span>
                            <input 
                                type="number" inputMode="numeric" required placeholder="ต้นทุน"
                                value={baleForm.cost} onChange={e => setBaleForm({...baleForm, cost: e.target.value})}
                                className="w-full p-4 pl-9 bg-slate-50 border border-slate-200/60 rounded-2xl text-[14px] font-black outline-none focus:border-orange-400 focus:bg-white transition-colors"
                            />
                        </div>
                        <input 
                            type="number" inputMode="numeric" placeholder="จำนวนตัว"
                            value={baleForm.count} onChange={e => setBaleForm({...baleForm, count: e.target.value})}
                            className="flex-1 w-full p-4 bg-slate-50 border border-slate-200/60 rounded-2xl text-[14px] font-bold outline-none focus:border-orange-400 focus:bg-white transition-colors placeholder-slate-400"
                        />
                        </div>
                        <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white py-4 rounded-2xl font-black text-[14px] mt-2 transition-all active:scale-95 shadow-[0_8px_20px_rgba(249,115,22,0.3)] flex justify-center items-center gap-2">
                        <Icon name="plus" size={18} strokeWidth={3}/> บันทึกกระสอบ
                        </button>
                    </form>
                    </div>

                    <div>
                    <h3 className="font-black text-slate-800 px-2 mb-4 text-[15px]">ประวัติกระสอบ ({bales.length})</h3>
                    <div className="space-y-4">
                        {bales.map(bale => (
                        <div key={bale.id} className="bg-white p-5 rounded-[24px] border border-slate-100 shadow-sm relative overflow-hidden group">
                            <div className="absolute top-0 bottom-0 left-0 w-2 bg-gradient-to-b from-amber-300 to-orange-500"></div>
                            <div className="flex justify-between items-start mb-4 pl-2">
                            <div>
                                <h4 className="font-black text-slate-800 text-[15px] tracking-tight">{bale.name}</h4>
                                <p className="text-[10px] text-slate-400 font-bold tracking-widest uppercase mt-1">{new Date(bale.timestamp).toLocaleDateString('th-TH')}</p>
                            </div>
                            <button onClick={() => setDeleteTarget({ type: 'bale', id: bale.id })} className="text-slate-300 hover:text-rose-500 bg-slate-50 hover:bg-rose-50 p-2 rounded-xl transition-colors"><Icon name="trash-2" size={14}/></button>
                            </div>
                            <div className="flex justify-between items-center text-xs pl-2 pt-4 border-t border-slate-50">
                            <div className="flex flex-col">
                                <span className="text-slate-400 text-[10px] uppercase font-bold tracking-widest mb-1">ทุน</span>
                                <span className="font-black text-slate-700 text-[14px]">฿{bale.cost.toLocaleString()}</span>
                            </div>
                            <div className="flex flex-col text-center">
                                <span className="text-slate-400 text-[10px] uppercase font-bold tracking-widest mb-1">จำนวน</span>
                                <span className="font-black text-slate-600 text-[14px]">{bale.estimatedCount || '-'} ตัว</span>
                            </div>
                            <div className="flex flex-col text-right">
                                <span className="text-slate-400 text-[10px] uppercase font-bold tracking-widest mb-1">เฉลี่ยต่อตัว</span>
                                <span className="font-black text-orange-500 text-[14px]">{bale.estimatedCount > 0 ? `฿${(bale.cost/bale.estimatedCount).toFixed(0)}` : '-'}</span>
                            </div>
                            </div>
                        </div>
                        ))}
                        {bales.length === 0 && <p className="text-center text-slate-400 text-sm font-bold py-10 bg-white/50 rounded-[24px] border border-slate-100">ยังไม่มีประวัติกระสอบ</p>}
                    </div>
                    </div>
                </div>
                );
            };

            const renderQrTab = () => (
                <div className="p-4 max-w-md mx-auto w-full min-h-[100dvh] flex flex-col justify-center animate-zoom-in pb-32 relative safe-pt">
                <div className="absolute inset-0 bg-gradient-to-br from-blue-50 via-white to-purple-50 -z-10"></div>
                
                {!settings.promptpayId ? (
                    <div className="bg-white/80 backdrop-blur-xl p-8 rounded-[32px] shadow-[0_20px_40px_rgb(0,0,0,0.04)] border border-white text-center">
                    <div className="w-24 h-24 bg-gradient-to-br from-amber-100 to-amber-200 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                        <Icon name="alert-circle" size={40} className="text-amber-600 drop-shadow-sm" />
                    </div>
                    <h2 className="text-2xl font-black text-slate-800 mb-3 tracking-tight">ตั้งค่าการรับเงิน</h2>
                    <p className="text-slate-500 text-[14px] font-medium mb-8 leading-relaxed">กรุณาระบุเบอร์พร้อมเพย์ก่อนใช้งาน QR Code</p>
                    <button 
                        onClick={() => setActiveTab('settings')}
                        className="bg-slate-900 text-white px-6 py-4 rounded-2xl font-black w-full shadow-[0_10px_20px_rgba(0,0,0,0.1)] active:scale-95 transition-all"
                    >
                        ไปตั้งค่าบัญชี
                    </button>
                    </div>
                ) : (
                    <div className="bg-white rounded-[40px] shadow-[0_30px_60px_rgb(0,0,0,0.08)] border border-slate-100 overflow-hidden text-center relative">
                    <div className="absolute top-0 left-0 right-0 h-32 bg-gradient-to-b from-blue-50 to-transparent pointer-events-none"></div>
                    
                    <div className="pt-12 pb-8 px-6 relative z-10">
                        <div className="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-[24px] flex items-center justify-center mx-auto mb-6 shadow-[0_10px_20px_rgba(59,130,246,0.3)] rotate-3">
                            <Icon name="qr-code" size={36} className="text-white -rotate-3 drop-shadow-sm" />
                        </div>
                        <p className="text-slate-400 text-[12px] font-black tracking-widest uppercase mb-2">ยอดชำระล่าสุด</p>
                        <div className="flex justify-center items-baseline gap-1.5 mb-8">
                        <span className="text-3xl font-black text-slate-300">฿</span>
                        <span className="text-6xl font-black text-slate-800 tracking-tighter drop-shadow-sm">
                            {todaySales.length > 0 && todaySales[0].paymentMethod === 'transfer' ? todaySales[0].amount.toLocaleString() : '0'}
                        </span>
                        </div>
                        
                        <div className="bg-white p-4 rounded-[32px] inline-block mb-8 shadow-[0_0_0_2px_rgba(0,0,0,0.02),0_15px_30px_rgba(0,0,0,0.08)]">
                        <img 
                            src={`https://promptpay.io/${settings.promptpayId}/${todaySales.length > 0 && todaySales[0].paymentMethod === 'transfer' ? todaySales[0].amount : 0}.png`} 
                            alt="PromptPay QR" 
                            className="w-64 h-64 object-contain rounded-2xl"
                        />
                        </div>

                        <div className="bg-slate-50/80 p-5 rounded-3xl border border-slate-100/50">
                        <p className="text-[10px] text-slate-400 font-black mb-1.5 uppercase tracking-widest">บัญชีรับเงิน (พร้อมเพย์)</p>
                        <p className="font-mono font-black text-slate-800 text-xl tracking-widest">{settings.promptpayId}</p>
                        </div>
                    </div>

                    <div className="p-6 bg-slate-50/50 border-t border-slate-100">
                        <button 
                        onClick={() => setActiveTab('sell')}
                        className="w-full bg-slate-900 text-white py-5 rounded-[24px] font-black text-[16px] active:scale-95 transition-all shadow-[0_10px_20px_rgba(0,0,0,0.1)]"
                        >
                        กลับหน้าขายสินค้า
                        </button>
                    </div>
                    </div>
                )}
                </div>
            );

            const renderSettingsTab = () => (
                <div className="p-4 pb-32 max-w-md mx-auto w-full animate-fade-in safe-pt">
                <h1 className="text-2xl font-black text-slate-800 mb-6 px-2 pt-2 tracking-tight">ตั้งค่าระบบ</h1>
                
                <div className="bg-white/80 backdrop-blur-xl p-6 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white space-y-6">
                    <div>
                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-2">ชื่อร้าน / แผง</label>
                    <input 
                        type="text" 
                        value={settings.shopName}
                        onChange={(e) => setSettings({...settings, shopName: e.target.value})}
                        className="w-full p-4 bg-slate-50 border border-slate-200/60 rounded-2xl text-[15px] font-black text-slate-800 outline-none focus:border-purple-400 focus:bg-white transition-colors"
                    />
                    </div>

                    <div>
                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-2 flex items-center">
                        เบอร์พร้อมเพย์
                    </label>
                    <div className="relative">
                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-blue-500">
                            <Icon name="qr-code" size={20} />
                        </span>
                        <input 
                            type="text" inputMode="numeric"
                            placeholder="เบอร์มือถือ หรือ เลข ปชช."
                            value={settings.promptpayId}
                            onChange={(e) => setSettings({...settings, promptpayId: e.target.value})}
                            className="w-full p-4 pl-12 bg-slate-50 border border-slate-200/60 rounded-2xl text-[15px] font-mono font-black text-slate-800 outline-none focus:border-blue-400 focus:bg-white transition-colors tracking-widest"
                        />
                    </div>
                    <p className="text-[11px] text-slate-400 mt-2 font-bold tracking-wide">สร้าง QR Code รับเงินอัตโนมัติ (ไม่บังคับ)</p>
                    </div>
                </div>

                <div className="mt-8">
                    <button 
                        onClick={() => setDeleteTarget({ type: 'all' })}
                        className="w-full bg-white border border-rose-100 text-rose-500 font-black py-4 rounded-[24px] text-[14px] hover:bg-rose-50 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-[0_8px_20px_rgb(225,29,72,0.1)]"
                    >
                        <Icon name="trash-2" size={18} strokeWidth={3}/> ล้างข้อมูลระบบ
                    </button>
                </div>

                <div className="text-center mt-12 mb-8">
                    <p className="bg-clip-text text-transparent bg-gradient-to-r from-purple-500 to-pink-500 text-[12px] font-black uppercase tracking-widest mb-1">Market POS Pro</p>
                    <p className="text-slate-400 text-[10px] font-bold tracking-wide">Version 21.0 Custom Prices</p>
                </div>
                </div>
            );

            return (
                <div className="bg-[#eef2f6] min-h-[100dvh] w-full flex justify-center overflow-x-hidden">
                
                <div className="w-full max-w-md bg-transparent min-h-[100dvh] flex flex-col relative sm:shadow-[0_0_50px_rgba(0,0,0,0.1)] sm:bg-[#eef2f6] sm:border-x border-slate-300/30">
                    
                    <div className="fixed top-0 left-0 w-full h-96 bg-gradient-to-b from-blue-100/50 to-transparent pointer-events-none z-[-1]"></div>

                    {toast && (
                        <div className="fixed top-[env(safe-area-inset-top,20px)] left-1/2 -translate-x-1/2 z-[100] animate-slide-down pointer-events-none w-full max-w-[350px] px-4 flex justify-center">
                            <div className={`px-5 py-3.5 rounded-full flex items-center gap-3 text-[14px] font-black border shadow-xl w-full justify-center ${
                                toast.type === 'delete' 
                                ? 'bg-slate-800 text-white shadow-[0_15px_30px_rgba(15,23,42,0.3)] border-slate-700' 
                                : 'bg-gradient-to-r from-[#00b09b] to-[#96c93d] text-white shadow-[0_15px_30px_rgba(0,176,155,0.3)] border-emerald-400/50'
                            }`}>
                                <Icon name={toast.type === 'delete' ? 'trash-2' : 'check-circle-2'} size={20} className="text-white drop-shadow-sm" /> 
                                {toast.message}
                            </div>
                        </div>
                    )}

                    <div className="flex-grow z-0">
                    {activeTab === 'sell' && renderSellTab()}
                    {activeTab === 'history' && renderHistoryTab()}
                    {activeTab === 'qr' && renderQrTab()}
                    {activeTab === 'stock' && renderStockTab()}
                    {activeTab === 'settings' && renderSettingsTab()}
                    </div>

                    {deleteTarget && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[70] flex items-center justify-center p-4 animate-fade-in">
                        <div className="bg-white/95 backdrop-blur-xl rounded-[40px] w-full max-w-[320px] p-6 shadow-[0_20px_50px_rgba(0,0,0,0.2)] animate-zoom-in border border-white text-center">
                            
                            <div className="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                                <Icon name={deleteTarget.type === 'all' ? "alert-triangle" : "trash-2"} size={36} className="text-rose-500 drop-shadow-sm" />
                            </div>
                            
                            <h3 className="text-2xl font-black mb-2 text-slate-800 tracking-tight">
                                {deleteTarget.type === 'all' ? 'ล้างข้อมูลทั้งหมด?' : 'ยืนยันการลบ?'}
                            </h3>
                            
                            <p className="text-slate-500 text-[13px] font-medium mb-8 leading-relaxed px-2">
                                {deleteTarget.type === 'all' 
                                    ? 'ข้อมูลการขาย รายจ่าย และประวัติกระสอบทั้งหมดจะถูกลบ และไม่สามารถกู้คืนได้' 
                                    : 'คุณต้องการลบรายการนี้ใช่หรือไม่? ข้อมูลนี้จะไม่สามารถกู้คืนได้'}
                            </p>
                            
                            <div className="flex gap-3">
                                <button 
                                    onClick={() => setDeleteTarget(null)} 
                                    className="flex-1 py-4 bg-slate-100 text-slate-600 font-black rounded-[20px] hover:bg-slate-200 transition-colors"
                                >
                                    ยกเลิก
                                </button>
                                <button 
                                    onClick={executeDelete} 
                                    className="flex-1 py-4 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-black rounded-[20px] active:scale-95 transition-all shadow-[0_8px_20px_rgba(244,63,94,0.3)]"
                                >
                                    ลบข้อมูล
                                </button>
                            </div>

                        </div>
                    </div>
                    )}

                    {showExpenseModal && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] flex items-end justify-center p-0 animate-fade-in">
                        <div className="bg-white/95 backdrop-blur-xl rounded-t-[40px] w-full max-w-md p-6 pb-[env(safe-area-inset-bottom,20px)] shadow-[0_-20px_50px_rgba(0,0,0,0.2)] animate-slide-up border-t border-white">
                        <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
                        <h3 className="text-2xl font-black mb-6 text-slate-800 text-center tracking-tight">บันทึกรายจ่าย</h3>
                        <form onSubmit={handleAddExpense} className="space-y-4">
                            <div>
                            <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-2">ประเภทรายจ่าย</label>
                            <select 
                                value={expenseForm.type} onChange={e => setExpenseForm({...expenseForm, type: e.target.value})}
                                className="w-full p-4 bg-slate-50 border border-slate-200/60 rounded-2xl text-[15px] font-bold text-slate-700 outline-none focus:border-rose-400 focus:bg-white transition-colors"
                            >
                                {expenseTypes.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                            </div>
                            <div>
                            <label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-2">ชื่อรายการ</label>
                            <input 
                                type="text" required placeholder="เช่น ค่าข้าว, ค่าไฟ"
                                value={expenseForm.name} onChange={e => setExpenseForm({...expenseForm, name: e.target.value})}
                                className="w-full p-4 bg-slate-50 border border-slate-200/60 rounded-2xl text-[15px] font-bold text-slate-700 outline-none focus:border-rose-400 focus:bg-white transition-colors"
                            />
                            </div>
                            <div>
                            <label className="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-2">จำนวนเงิน</label>
                            <div className="relative">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-black text-lg">฿</span>
                                <input 
                                    type="number" inputMode="numeric" required placeholder="0"
                                    value={expenseForm.amount} onChange={e => setExpenseForm({...expenseForm, amount: e.target.value})}
                                    className="w-full p-4 pl-10 bg-slate-50 border border-slate-200/60 rounded-2xl text-3xl font-black text-rose-500 outline-none focus:border-rose-400 focus:bg-white transition-colors"
                                />
                            </div>
                            </div>
                            <div className="flex gap-3 pt-6">
                            <button type="button" onClick={() => setShowExpenseModal(false)} className="flex-1 py-4 bg-slate-100 text-slate-600 font-black rounded-[20px] hover:bg-slate-200 transition-colors">ยกเลิก</button>
                            <button type="submit" className="flex-1 py-4 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-black rounded-[20px] active:scale-95 transition-all shadow-[0_8px_20px_rgba(244,63,94,0.3)]">บันทึก</button>
                            </div>
                        </form>
                        </div>
                    </div>
                    )}

                    <div className="fixed bottom-0 w-full max-w-md z-50 px-5 pb-[env(safe-area-inset-bottom,20px)] pt-2 pointer-events-none">
                        <div className="bg-white/90 backdrop-blur-2xl border border-white/60 flex justify-around p-2.5 rounded-[36px] shadow-[0_15px_40px_rgba(0,0,0,0.08)] pointer-events-auto">
                        {[
                            { id: 'sell', icon: 'shopping-bag', label: 'ขาย' },
                            { id: 'qr', icon: 'qr-code', label: 'QR' },
                            { id: 'history', icon: 'history', label: 'บิล' },
                            { id: 'stock', icon: 'package-open', label: 'คลัง' },
                            { id: 'settings', icon: 'settings', label: 'ตั้งค่า' },
                        ].map(tab => {
                            const isActive = activeTab === tab.id;
                            return (
                            <button 
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`relative flex flex-col items-center justify-center py-2 px-1 w-[60px] rounded-[24px] transition-all duration-300 ${
                                isActive ? 'text-purple-600' : 'text-slate-400 hover:text-slate-600'
                                }`}
                            >
                                {isActive && (
                                    <div className="absolute inset-0 bg-gradient-to-br from-purple-100 to-pink-100 rounded-[24px] -z-10 animate-zoom-in opacity-80"></div>
                                )}
                                <Icon name={tab.icon} size={isActive ? 24 : 22} className={`mb-1.5 transition-all duration-300 ${isActive ? 'drop-shadow-sm' : ''}`} strokeWidth={isActive ? 2.5 : 1.5} />
                                <span className={`text-[10px] tracking-wide transition-all duration-300 ${isActive ? 'font-black' : 'font-bold'}`}>{tab.label}</span>
                            </button>
                            )
                        })}
                        </div>
                    </div>

                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
